<test id="cascade-font-family" name="cascade: font-family">
    <container>
        <html lang="en" xmlns="http://www.w3.org/1999/xhtml">

        <body>
        <slot />
        </body>

        </html>
    </container>

    <rendering>
        <div style="font-family: serif">
            Foo Bar
        </div>
    </rendering>

    <rendering>
        <div style="font-family: serif; display: contents">
            <div>
                Foo Bar
            </div>
        </div>
    </rendering>

    <error>
        <div>
            Foo Bar
        </div>
    </error>
</test>
