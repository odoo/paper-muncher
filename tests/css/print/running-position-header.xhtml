<tests>
  <test name="running-header-fix" flow="paginate" width="210mm" height="297mm" margins="10mm">

    <!-- REFERENCE: manually place a green box at the bottom of each page -->
    <rendering>
      <html xmlns="http://www.w3.org/1999/xhtml">
        <head>
          <style>
            body { margin: 0; }
            .page {
              height: 100vh;
              width: 100%;
              background: #eee;
              position: relative;
            }
            .box {
              position: absolute;
              bottom: 10mm;
              left: 50%;
              transform: translateX(-50%);
              width: 50px;
              height: 20px;
              background: green;
            }
          </style>
        </head>
        <body>
          <div class="page" style="break-after: page;">
            <div class="box"></div>
          </div>
          <div class="page">
            <div class="box"></div>
          </div>
        </body>
      </html>
    </rendering>

    <!-- TEST: use a running header to place the same green box -->
    <rendering>
      <html xmlns="http://www.w3.org/1999/xhtml">
        <head>
          <style>
            @page {
              @bottom-center {
                content: element(header);
              }
            }
            body { margin: 0; }
            .page {
              height: 100vh;
              width: 100%;
              background: #eee;
            }
            .header {
              position: running(header);
              width: 50px;
              height: 20px;
              background: green;
            }
          </style>
        </head>
        <body>
          <!-- The running element placed anywhere in the document -->
          <div class="header"></div>
          <div class="page" style="break-after: page;"></div>
          <div class="page"></div>
        </body>
      </html>
    </rendering>

  </test>
</tests>
